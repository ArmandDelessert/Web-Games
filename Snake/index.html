<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Snake</title>
    <meta name="description" content="Jeu du serpent continu en style monochrome">
    <style>
        :root {
            --color-bg: #fafafa;
            --color-fg: #1a1a1a;
            --color-muted: #999;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --color-bg: #121212;
                --color-fg: #e0e0e0;
                --color-muted: #666;
            }
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                         "Helvetica Neue", Arial, sans-serif;
            background: var(--color-bg);
            color: var(--color-fg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; overflow: hidden;
        }

        #game-container { position: relative; display: flex; flex-direction: column; align-items: center; }
        #score { font-size: 1.1rem; font-variant-numeric: tabular-nums; margin-bottom: 0.75rem; }
        #game-svg { display: block; border: 1px solid var(--color-fg); }

        .svg-bg { fill: var(--color-bg); }
        .svg-border { fill: none; stroke: var(--color-fg); stroke-width: 1; }
        .svg-snake { fill: none; stroke: var(--color-fg); stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
        .svg-head { fill: var(--color-fg); }
        .svg-food { fill: var(--color-fg); }

        #overlay {
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            background: var(--color-bg); opacity: 0.92; text-align: center;
        }
        #overlay.hidden { display: none; }
        #overlay-text p { margin-bottom: 0.5rem; }
        #game-over-text { font-size: 1.5rem; font-weight: 700; }
        #restart-hint { font-size: 0.85rem; color: var(--color-muted); }
        #best-score { font-size: 0.9rem; color: var(--color-muted); min-height: 1.4em; }

        #settings { display: flex; flex-direction: column; gap: 0.75rem; margin: 1rem 0; width: 240px; }
        .setting-row { display: flex; flex-direction: column; gap: 0.25rem; }
        .setting-header { display: flex; justify-content: space-between; font-size: 0.9rem; }
        .setting-value { font-variant-numeric: tabular-nums; }
        input[type="range"] {
            -webkit-appearance: none; appearance: none; width: 100%; height: 6px;
            background: var(--color-muted); border-radius: 3px; outline: none; cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none; width: 16px; height: 16px;
            background: var(--color-fg); border-radius: 50%; cursor: pointer;
        }
        input[type="range"]::-moz-range-thumb {
            width: 16px; height: 16px; background: var(--color-fg); border: none;
            border-radius: 50%; cursor: pointer;
        }
        .setting-ticks { display: flex; justify-content: space-between; padding: 0 7px; margin-top: 2px; }
        .setting-ticks span { width: 1px; height: 6px; background: var(--color-muted); }
        #settings.hidden { display: none; }
    </style>
</head>
<body>
    <div id="game-container">
        <p id="score">Score : 0</p>
        <svg id="game-svg" xmlns="http://www.w3.org/2000/svg">
            <rect class="svg-bg" x="0" y="0" width="500" height="500" />
            <rect class="svg-border" x="0" y="0" width="500" height="500" />
            <polyline id="svg-snake" class="svg-snake" points="" />
            <circle id="svg-head" class="svg-head" r="3.6" cx="0" cy="0" />
            <circle id="svg-food" class="svg-food" r="5" cx="0" cy="0" />
        </svg>
        <div id="overlay">
            <div id="overlay-text">
                <p id="game-over-text">Snake</p>
                <p id="final-score"></p>
                <div id="settings">
                    <div class="setting-row">
                        <div class="setting-header">
                            <span>Vitesse</span>
                            <span class="setting-value" id="speed-value">Normale</span>
                        </div>
                        <input type="range" id="setting-speed" min="0" max="3" step="1" value="1">
                        <div class="setting-ticks"><span></span><span></span><span></span><span></span></div>
                    </div>
                </div>
                <p id="best-score"></p>
                <p id="restart-hint"></p>
            </div>
        </div>
    </div>

    <script>
    (function () {
        /* ── Constants ── */
        var FIELD_W = 500;
        var FIELD_H = 500;
        var SNAKE_WIDTH = 3;
        var FOOD_R = 5;
        var INITIAL_LENGTH = 30;
        var GROWTH_PER_FOOD = 15;
        var SPEED_VALUES = [80, 120, 160, 200];
        var SPEED_LABELS = ['Lente', 'Normale', 'Rapide', 'Tr\u00e8s rapide'];
        var isTouchDevice = ('ontouchstart' in window);

        /* ── State ── */
        var snakePath = [];
        var snakeLength = INITIAL_LENGTH;
        var heading = { x: 1, y: 0 };
        var food = { x: 0, y: 0 };
        var score = 0;
        var gameOver = false;
        var gameStarted = false;
        var lastTime = 0;
        var animId = 0;

        /* ── DOM ── */
        var svgEl = document.getElementById('game-svg');
        var bgEl = svgEl.querySelector('.svg-bg');
        var borderEl = svgEl.querySelector('.svg-border');
        var snakeEl = document.getElementById('svg-snake');
        var headEl = document.getElementById('svg-head');
        var foodEl = document.getElementById('svg-food');
        var scoreEl = document.getElementById('score');
        var overlayEl = document.getElementById('overlay');
        var gameOverTextEl = document.getElementById('game-over-text');
        var finalScoreEl = document.getElementById('final-score');
        var bestScoreEl = document.getElementById('best-score');
        var restartHintEl = document.getElementById('restart-hint');
        var settingsEl = document.getElementById('settings');
        var settingSpeedEl = document.getElementById('setting-speed');
        var speedValueEl = document.getElementById('speed-value');

        /* ── Geometry utilities ── */
        function dist(a, b) { var dx = b.x - a.x, dy = b.y - a.y; return Math.sqrt(dx * dx + dy * dy); }
        function dot(a, b) { return a.x * b.x + a.y * b.y; }

        function distPointToSeg(p, a, b) {
            var ab = { x: b.x - a.x, y: b.y - a.y };
            var ap = { x: p.x - a.x, y: p.y - a.y };
            var abLen2 = dot(ab, ab);
            if (abLen2 < 1e-12) return dist(p, a);
            var t = dot(ap, ab) / abLen2;
            t = Math.max(0, Math.min(1, t));
            return dist(p, { x: a.x + ab.x * t, y: a.y + ab.y * t });
        }

        /* ── High scores (localStorage) ── */
        function loadHighScores() {
            try {
                return JSON.parse(localStorage.getItem('snake-highscores')) || [];
            } catch (e) {
                return [];
            }
        }

        function saveHighScore(newScore, speedIdx) {
            var all = loadHighScores();
            all.push({
                score: newScore,
                speed: speedIdx,
                date: new Date().toISOString().slice(0, 10)
            });
            // Keep top 20 per speed config (new format: no grid property)
            var thisConfig = all.filter(function (s) { return s.speed === speedIdx && !s.grid; });
            thisConfig.sort(function (a, b) { return b.score - a.score; });
            thisConfig = thisConfig.slice(0, 20);
            var others = all.filter(function (s) { return s.speed !== speedIdx || s.grid; });
            localStorage.setItem('snake-highscores', JSON.stringify(others.concat(thisConfig)));
        }

        function getBestScore(speedIdx) {
            var scores = loadHighScores();
            var best = 0;
            for (var i = 0; i < scores.length; i++) {
                if (scores[i].speed === speedIdx && !scores[i].grid && scores[i].score > best) {
                    best = scores[i].score;
                }
            }
            return best;
        }

        function showBestScore() {
            var si = parseInt(settingSpeedEl.value, 10);
            var best = getBestScore(si);
            bestScoreEl.textContent = best > 0 ? 'Meilleur score : ' + best : '';
        }

        function saveSettings(speed) {
            localStorage.setItem('snake-settings-speed', speed);
        }

        function loadSettings() {
            return {
                speed: parseInt(localStorage.getItem('snake-settings-speed') || '1')
            };
        }

        /* ── Sizing ── */
        function resize() {
            var maxW = window.innerWidth - 32;
            var maxH = window.innerHeight - 80;

            // Compute field height from screen ratio
            FIELD_H = FIELD_W * maxH / maxW;

            svgEl.setAttribute('viewBox', '0 0 ' + FIELD_W + ' ' + FIELD_H);

            // Update background and border rects
            bgEl.setAttribute('width', FIELD_W);
            bgEl.setAttribute('height', FIELD_H);
            borderEl.setAttribute('width', FIELD_W);
            borderEl.setAttribute('height', FIELD_H);

            // SVG fills available space (viewBox ratio = element ratio → no letterboxing)
            svgEl.style.width = maxW + 'px';
            svgEl.style.height = maxH + 'px';

            // If food is out of bounds after resize, reposition it
            if (food.x > FIELD_W - FOOD_R || food.y > FIELD_H - FOOD_R) {
                spawnFood();
            }

            render();
        }

        window.addEventListener('resize', resize);

        /* ── Snake movement ── */
        function moveSnake(dt) {
            var speed = SPEED_VALUES[parseInt(settingSpeedEl.value, 10)];
            var step = speed * dt;
            var head = snakePath[snakePath.length - 1];
            var nx = head.x + heading.x * step;
            var ny = head.y + heading.y * step;

            // Extend or add new point
            if (snakePath.length >= 2) {
                var prev = snakePath[snakePath.length - 2];
                var segDx = head.x - prev.x;
                var segDy = head.y - prev.y;
                var segLen = Math.sqrt(segDx * segDx + segDy * segDy);
                if (segLen > 0.001) {
                    var segDir = { x: segDx / segLen, y: segDy / segLen };
                    // Same direction? Extend last point
                    if (Math.abs(segDir.x - heading.x) < 0.01 && Math.abs(segDir.y - heading.y) < 0.01) {
                        snakePath[snakePath.length - 1] = { x: nx, y: ny };
                    } else {
                        snakePath.push({ x: nx, y: ny });
                    }
                } else {
                    snakePath[snakePath.length - 1] = { x: nx, y: ny };
                }
            } else {
                snakePath.push({ x: nx, y: ny });
            }

            // Trim tail
            trimTail();
        }

        function trimTail() {
            // Compute total path length
            var totalLen = 0;
            for (var i = 0; i < snakePath.length - 1; i++) {
                totalLen += dist(snakePath[i], snakePath[i + 1]);
            }

            // Remove excess from tail
            var excess = totalLen - snakeLength;
            while (excess > 0 && snakePath.length > 1) {
                var segL = dist(snakePath[0], snakePath[1]);
                if (segL <= excess + 0.001 && snakePath.length > 2) {
                    // Remove entire tail segment
                    excess -= segL;
                    snakePath.shift();
                } else {
                    // Partial trim: move snakePath[0] forward along this segment
                    var ratio = Math.min(excess / segL, 1);
                    snakePath[0] = {
                        x: snakePath[0].x + (snakePath[1].x - snakePath[0].x) * ratio,
                        y: snakePath[0].y + (snakePath[1].y - snakePath[0].y) * ratio
                    };
                    excess = 0;
                }
            }
        }

        /* ── Collisions ── */
        function checkCollisions() {
            var head = snakePath[snakePath.length - 1];

            // Wall collision
            if (head.x < 0 || head.x > FIELD_W || head.y < 0 || head.y > FIELD_H) {
                endGame();
                return;
            }

            // Self collision (skip last 2 segments near head)
            var hitDist = SNAKE_WIDTH / 2 + 0.5;
            for (var i = 0; i < snakePath.length - 3; i++) {
                if (distPointToSeg(head, snakePath[i], snakePath[i + 1]) < hitDist) {
                    endGame();
                    return;
                }
            }

            // Food collision
            if (dist(head, food) < FOOD_R + SNAKE_WIDTH / 2) {
                score++;
                scoreEl.textContent = 'Score : ' + score;
                snakeLength += GROWTH_PER_FOOD;
                spawnFood();
            }
        }

        /* ── Food ── */
        function spawnFood() {
            var margin = FOOD_R + 2;
            for (var attempt = 0; attempt < 100; attempt++) {
                var fx = margin + Math.random() * (FIELD_W - 2 * margin);
                var fy = margin + Math.random() * (FIELD_H - 2 * margin);
                // Check distance to snake
                var tooClose = false;
                for (var i = 0; i < snakePath.length - 1; i++) {
                    if (distPointToSeg({ x: fx, y: fy }, snakePath[i], snakePath[i + 1]) < FOOD_R + SNAKE_WIDTH + 2) {
                        tooClose = true;
                        break;
                    }
                }
                if (!tooClose) {
                    food = { x: fx, y: fy };
                    return;
                }
            }
            // Fallback: place anyway
            food = { x: fx, y: fy };
        }

        /* ── Rendering ── */
        function render() {
            if (!snakePath.length) return;

            // Snake body polyline
            var pts = '';
            for (var i = 0; i < snakePath.length; i++) {
                if (i > 0) pts += ' ';
                pts += snakePath[i].x.toFixed(1) + ',' + snakePath[i].y.toFixed(1);
            }
            snakeEl.setAttribute('points', pts);

            // Snake head
            var head = snakePath[snakePath.length - 1];
            headEl.setAttribute('cx', head.x.toFixed(1));
            headEl.setAttribute('cy', head.y.toFixed(1));

            // Food
            foodEl.setAttribute('cx', food.x.toFixed(1));
            foodEl.setAttribute('cy', food.y.toFixed(1));
        }

        /* ── Game lifecycle ── */
        function initGame() {
            snakePath = [
                { x: FIELD_W / 2 - INITIAL_LENGTH, y: FIELD_H / 2 },
                { x: FIELD_W / 2, y: FIELD_H / 2 }
            ];
            heading = { x: 1, y: 0 };
            snakeLength = INITIAL_LENGTH;
            score = 0;
            gameOver = false;
            gameStarted = false;
            scoreEl.textContent = 'Score : 0';
            spawnFood();
            render();
        }

        function startGame() {
            gameStarted = true;
            settingsEl.classList.add('hidden');
            overlayEl.classList.add('hidden');
            lastTime = performance.now();
            animId = requestAnimationFrame(gameLoop);
        }

        function endGame() {
            gameOver = true;
            cancelAnimationFrame(animId);

            var si = parseInt(settingSpeedEl.value, 10);
            var best = getBestScore(si);
            var isNewRecord = score > best;
            saveHighScore(score, si);

            gameOverTextEl.textContent = 'Game Over';
            finalScoreEl.textContent = 'Score : ' + score;

            if (isNewRecord && score > 0) {
                bestScoreEl.textContent = 'Nouveau record !';
            } else {
                bestScoreEl.textContent = 'Meilleur : ' + Math.max(best, score);
            }

            restartHintEl.textContent = isTouchDevice ? 'Toucher pour recommencer' : 'Appuyer sur \u00ab\u00a0Espace\u00a0\u00bb pour recommencer';
            overlayEl.classList.remove('hidden');
        }

        function restartGame() {
            gameOverTextEl.textContent = 'Snake';
            finalScoreEl.textContent = '';
            settingsEl.classList.remove('hidden');
            showBestScore();
            restartHintEl.textContent = isTouchDevice ? 'Toucher pour jouer' : 'Appuyer sur \u00ab\u00a0Espace\u00a0\u00bb pour jouer';
            initGame();
            overlayEl.classList.remove('hidden');
        }

        /* ── Game loop ── */
        function gameLoop(now) {
            if (!gameStarted || gameOver) return;
            var dt = Math.min((now - lastTime) / 1000, 0.05);
            lastTime = now;

            moveSnake(dt);
            checkCollisions();
            if (gameOver) return;
            render();

            animId = requestAnimationFrame(gameLoop);
        }

        /* ── Settings ── */
        function updateSettingLabels() {
            var si = parseInt(settingSpeedEl.value, 10);
            speedValueEl.textContent = SPEED_LABELS[si];
        }

        settingSpeedEl.addEventListener('input', function () {
            saveSettings(this.value);
            updateSettingLabels();
            showBestScore();
        });

        /* ── Keyboard controls ── */
        document.addEventListener('keydown', function (e) {
            // Slider keyboard control when settings visible
            if (!settingsEl.classList.contains('hidden')) {
                if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                    var val = parseInt(settingSpeedEl.value, 10);
                    if (e.key === 'ArrowRight' && val < 3) val++;
                    if (e.key === 'ArrowLeft' && val > 0) val--;
                    settingSpeedEl.value = val;
                    settingSpeedEl.dispatchEvent(new Event('input'));
                }
            }

            // Space/Enter: start/restart
            if (e.key === ' ' || e.key === 'Enter') {
                if (gameOver) restartGame();
                else if (!gameStarted) startGame();
            }

            // Direction keys (only during gameplay)
            if (gameStarted && !gameOver) {
                var newDir = null;
                switch (e.key) {
                    case 'ArrowUp': case 'w': case 'W':
                        newDir = { x: 0, y: -1 }; break;
                    case 'ArrowDown': case 's': case 'S':
                        newDir = { x: 0, y: 1 }; break;
                    case 'ArrowLeft': case 'a': case 'A':
                        newDir = { x: -1, y: 0 }; break;
                    case 'ArrowRight': case 'd': case 'D':
                        newDir = { x: 1, y: 0 }; break;
                }
                if (newDir) {
                    // Anti-reversal: ignore if opposite direction
                    if (dot(newDir, heading) > -0.5) {
                        heading = newDir;
                    }
                }
            }

            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' ', 'Enter'].indexOf(e.key) !== -1) {
                e.preventDefault();
            }
        });

        /* ── Touch controls ── */
        var touchActive = false;

        function screenToSVG(clientX, clientY) {
            var pt = svgEl.createSVGPoint();
            pt.x = clientX;
            pt.y = clientY;
            var ctm = svgEl.getScreenCTM();
            if (!ctm) return { x: 0, y: 0 };
            return pt.matrixTransform(ctm.inverse());
        }

        svgEl.addEventListener('touchstart', function (e) {
            touchActive = true;
            e.preventDefault();
        }, { passive: false });

        svgEl.addEventListener('touchmove', function (e) {
            if (!gameStarted || gameOver || !touchActive) return;
            var touch = e.touches[0];
            var svgPt = screenToSVG(touch.clientX, touch.clientY);
            var head = snakePath[snakePath.length - 1];
            var dx = svgPt.x - head.x;
            var dy = svgPt.y - head.y;
            var d = Math.sqrt(dx * dx + dy * dy);
            if (d > 10) {
                var newHeading = { x: dx / d, y: dy / d };
                // Anti-reversal
                if (dot(newHeading, heading) > -0.5) {
                    heading = newHeading;
                }
            }
            e.preventDefault();
        }, { passive: false });

        svgEl.addEventListener('touchend', function (e) {
            touchActive = false;
            e.preventDefault();
        }, { passive: false });

        // Tap-to-start / tap-to-restart via overlay (overlay intercepts touches when visible)
        var overlayTouchStartX, overlayTouchStartY;
        overlayEl.addEventListener('touchstart', function (e) {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'LABEL') return;
            overlayTouchStartX = e.touches[0].clientX;
            overlayTouchStartY = e.touches[0].clientY;
            e.preventDefault();
        }, { passive: false });

        overlayEl.addEventListener('touchend', function (e) {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'LABEL') return;
            if (overlayTouchStartX === undefined) return;
            var dx = e.changedTouches[0].clientX - overlayTouchStartX;
            var dy = e.changedTouches[0].clientY - overlayTouchStartY;
            overlayTouchStartX = undefined;
            if (Math.abs(dx) < 20 && Math.abs(dy) < 20) {
                if (gameOver) restartGame();
                else if (!gameStarted) startGame();
            }
            e.preventDefault();
        }, { passive: false });

        /* ── Init ── */
        var savedSettings = loadSettings();
        settingSpeedEl.value = savedSettings.speed;
        updateSettingLabels();
        showBestScore();
        restartHintEl.textContent = isTouchDevice ? 'Toucher pour jouer' : 'Appuyer sur \u00ab\u00a0Espace\u00a0\u00bb pour jouer';
        resize();
        initGame();
    })();
    </script>
</body>
</html>

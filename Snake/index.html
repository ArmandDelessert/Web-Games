<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Snake</title>
    <meta name="description" content="Jeu du serpent classique en style monochrome">
    <style>
        :root {
            --color-bg: #fafafa;
            --color-fg: #1a1a1a;
            --color-muted: #999;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --color-bg: #121212;
                --color-fg: #e0e0e0;
                --color-muted: #666;
            }
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                         "Helvetica Neue", Arial, sans-serif;
            background: var(--color-bg);
            color: var(--color-fg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #score {
            font-size: 1.1rem;
            font-variant-numeric: tabular-nums;
            margin-bottom: 0.75rem;
        }

        canvas {
            display: block;
            border: 1px solid var(--color-fg);
        }

        #overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--color-bg);
            opacity: 0.92;
            text-align: center;
        }

        #overlay.hidden {
            display: none;
        }

        #overlay-text p {
            margin-bottom: 0.5rem;
        }

        #game-over-text {
            font-size: 1.5rem;
            font-weight: 700;
        }

        #restart-hint {
            font-size: 0.85rem;
            color: var(--color-muted);
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="score">Score : 0</div>
        <canvas id="game-canvas"></canvas>
        <div id="overlay">
            <div id="overlay-text">
                <p id="game-over-text">Snake</p>
                <p id="final-score"></p>
                <p id="restart-hint">Appuyer sur Espace pour jouer</p>
            </div>
        </div>
    </div>

    <script>
        (function () {
            var GRID = 20;
            var TICK_MS = 120;
            var canvas = document.getElementById('game-canvas');
            var ctx = canvas.getContext('2d');
            var cellSize = 0;

            var snake, direction, nextDirection, food, score, gameOver, gameStarted, interval;

            // Theme
            var colorBg, colorFg;
            var darkQuery = window.matchMedia('(prefers-color-scheme: dark)');

            function updateColors() {
                colorBg = darkQuery.matches ? '#121212' : '#fafafa';
                colorFg = darkQuery.matches ? '#e0e0e0' : '#1a1a1a';
            }

            darkQuery.addEventListener('change', updateColors);
            updateColors();

            // Sizing
            function resize() {
                var max = Math.min(window.innerWidth - 32, window.innerHeight - 120);
                cellSize = Math.floor(max / GRID);
                var size = cellSize * GRID;
                canvas.width = size;
                canvas.height = size;
                draw();
            }

            window.addEventListener('resize', resize);

            // Drawing
            function draw() {
                ctx.fillStyle = colorBg;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                if (!snake) return;

                ctx.fillStyle = colorFg;

                // Food
                ctx.fillRect(
                    food.x * cellSize + 1,
                    food.y * cellSize + 1,
                    cellSize - 2,
                    cellSize - 2
                );

                // Snake
                for (var i = 0; i < snake.length; i++) {
                    var gap = i === 0 ? 0 : 1;
                    ctx.fillRect(
                        snake[i].x * cellSize + gap,
                        snake[i].y * cellSize + gap,
                        cellSize - gap * 2,
                        cellSize - gap * 2
                    );
                }
            }

            // Food spawn
            function spawnFood() {
                var pos;
                do {
                    pos = {
                        x: Math.floor(Math.random() * GRID),
                        y: Math.floor(Math.random() * GRID)
                    };
                } while (snake.some(function (s) { return s.x === pos.x && s.y === pos.y; }));
                food = pos;
            }

            // Game tick
            function tick() {
                if (gameOver) return;

                direction = nextDirection;

                var head = {
                    x: snake[0].x + direction.x,
                    y: snake[0].y + direction.y
                };

                // Wall collision
                if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID) {
                    endGame();
                    return;
                }

                // Self collision
                for (var i = 0; i < snake.length; i++) {
                    if (snake[i].x === head.x && snake[i].y === head.y) {
                        endGame();
                        return;
                    }
                }

                snake.unshift(head);

                if (head.x === food.x && head.y === food.y) {
                    score++;
                    document.getElementById('score').textContent = 'Score : ' + score;
                    spawnFood();
                } else {
                    snake.pop();
                }

                draw();
            }

            // Game lifecycle
            function initGame() {
                snake = [{ x: 10, y: 10 }];
                direction = { x: 1, y: 0 };
                nextDirection = { x: 1, y: 0 };
                score = 0;
                gameOver = false;
                gameStarted = false;
                document.getElementById('score').textContent = 'Score : 0';
                spawnFood();
                draw();
            }

            function startGame() {
                gameStarted = true;
                document.getElementById('overlay').classList.add('hidden');
                interval = setInterval(tick, TICK_MS);
            }

            function endGame() {
                gameOver = true;
                clearInterval(interval);
                document.getElementById('game-over-text').textContent = 'Game Over';
                document.getElementById('final-score').textContent = 'Score : ' + score;
                document.getElementById('restart-hint').textContent = 'Appuyer sur Espace pour recommencer';
                document.getElementById('overlay').classList.remove('hidden');
            }

            function restartGame() {
                initGame();
                startGame();
            }

            // Keyboard controls
            document.addEventListener('keydown', function (e) {
                switch (e.key) {
                    case 'ArrowUp': case 'w': case 'W':
                        if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                        break;
                    case 'ArrowDown': case 's': case 'S':
                        if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                        break;
                    case 'ArrowLeft': case 'a': case 'A':
                        if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                        break;
                    case 'ArrowRight': case 'd': case 'D':
                        if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                        break;
                    case ' ':
                        if (gameOver) restartGame();
                        else if (!gameStarted) startGame();
                        break;
                }
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].indexOf(e.key) !== -1) {
                    e.preventDefault();
                }
            });

            // Touch controls
            var touchStartX, touchStartY;
            var MIN_SWIPE = 30;

            canvas.addEventListener('touchstart', function (e) {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
                e.preventDefault();
            }, { passive: false });

            canvas.addEventListener('touchend', function (e) {
                if (touchStartX === undefined) return;
                var dx = e.changedTouches[0].clientX - touchStartX;
                var dy = e.changedTouches[0].clientY - touchStartY;
                touchStartX = undefined;

                if (Math.abs(dx) < MIN_SWIPE && Math.abs(dy) < MIN_SWIPE) {
                    if (gameOver) restartGame();
                    else if (!gameStarted) startGame();
                    return;
                }

                if (Math.abs(dx) > Math.abs(dy)) {
                    if (dx > 0 && direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    else if (dx < 0 && direction.x !== 1) nextDirection = { x: -1, y: 0 };
                } else {
                    if (dy > 0 && direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    else if (dy < 0 && direction.y !== 1) nextDirection = { x: 0, y: -1 };
                }
                e.preventDefault();
            }, { passive: false });

            // Init
            resize();
            initGame();
        })();
    </script>
</body>
</html>

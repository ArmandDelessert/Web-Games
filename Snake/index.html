<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Snake</title>
    <meta name="description" content="Jeu du serpent classique en style monochrome">
    <style>
        :root {
            --color-bg: #fafafa;
            --color-fg: #1a1a1a;
            --color-muted: #999;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --color-bg: #121212;
                --color-fg: #e0e0e0;
                --color-muted: #666;
            }
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                         "Helvetica Neue", Arial, sans-serif;
            background: var(--color-bg);
            color: var(--color-fg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #score {
            font-size: 1.1rem;
            font-variant-numeric: tabular-nums;
            margin-bottom: 0.75rem;
        }

        canvas {
            display: block;
            border: 1px solid var(--color-fg);
        }

        #overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--color-bg);
            opacity: 0.92;
            text-align: center;
        }

        #overlay.hidden {
            display: none;
        }

        #overlay-text p {
            margin-bottom: 0.5rem;
        }

        #game-over-text {
            font-size: 1.5rem;
            font-weight: 700;
        }

        #restart-hint {
            font-size: 0.85rem;
            color: var(--color-muted);
        }

        #best-score {
            font-size: 0.9rem;
            color: var(--color-muted);
            min-height: 1.4em;
        }

        #settings {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin: 1rem 0;
            width: 240px;
        }

        .setting-row {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .setting-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
        }

        .setting-value {
            font-variant-numeric: tabular-nums;
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 6px;
            background: var(--color-muted);
            border-radius: 3px;
            outline: none;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            background: var(--color-fg);
            border-radius: 50%;
            cursor: pointer;
        }

        input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: var(--color-fg);
            border: none;
            border-radius: 50%;
            cursor: pointer;
        }

        .setting-ticks {
            display: flex;
            justify-content: space-between;
            padding: 0 7px;
            margin-top: 2px;
        }

        .setting-ticks span {
            width: 1px;
            height: 6px;
            background: var(--color-muted);
        }

        #settings.hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="score">Score : 0</div>
        <canvas id="game-canvas"></canvas>
        <div id="overlay">
            <div id="overlay-text">
                <p id="game-over-text">Snake</p>
                <p id="final-score"></p>
                <div id="settings">
                    <div class="setting-row">
                        <div class="setting-header">
                            <span>Grille</span>
                            <span class="setting-value" id="grid-value">20 &times; 20</span>
                        </div>
                        <input type="range" id="setting-grid" min="0" max="4" step="1" value="2">
                        <div class="setting-ticks"><span></span><span></span><span></span><span></span><span></span></div>
                    </div>
                    <div class="setting-row">
                        <div class="setting-header">
                            <span>Vitesse</span>
                            <span class="setting-value" id="speed-value">Normale</span>
                        </div>
                        <input type="range" id="setting-speed" min="0" max="3" step="1" value="1">
                        <div class="setting-ticks"><span></span><span></span><span></span><span></span></div>
                    </div>
                </div>
                <p id="best-score"></p>
                <p id="restart-hint">Appuyer sur &laquo;&nbsp;Espace&nbsp;&raquo; pour jouer</p>
            </div>
        </div>
    </div>

    <script>
        (function () {
            var GRID = 20;
            var TICK_MS = 120;
            var canvas = document.getElementById('game-canvas');
            var ctx = canvas.getContext('2d');
            var cellSize = 0;

            var snake, direction, nextDirection, food, score, gameOver, gameStarted, interval;

            // DOM elements
            var scoreEl = document.getElementById('score');
            var overlayEl = document.getElementById('overlay');
            var gameOverTextEl = document.getElementById('game-over-text');
            var finalScoreEl = document.getElementById('final-score');
            var settingsEl = document.getElementById('settings');
            var bestScoreEl = document.getElementById('best-score');
            var restartHintEl = document.getElementById('restart-hint');
            var settingGridEl = document.getElementById('setting-grid');
            var settingSpeedEl = document.getElementById('setting-speed');

            // Theme
            var colorBg, colorFg;
            var darkQuery = window.matchMedia('(prefers-color-scheme: dark)');

            function updateColors() {
                colorBg = darkQuery.matches ? '#121212' : '#fafafa';
                colorFg = darkQuery.matches ? '#e0e0e0' : '#1a1a1a';
            }

            darkQuery.addEventListener('change', updateColors);
            updateColors();

            // High scores (localStorage)
            function loadHighScores() {
                try {
                    return JSON.parse(localStorage.getItem('snake-highscores')) || [];
                } catch (e) {
                    return [];
                }
            }

            function saveHighScore(newScore, grid, speed) {
                var all = loadHighScores();
                all.push({
                    score: newScore,
                    grid: grid,
                    speed: speed,
                    date: new Date().toISOString().slice(0, 10)
                });
                // Keep top 20 per grid/speed config
                var thisConfig = all.filter(function (s) { return s.grid === grid && s.speed === speed; });
                thisConfig.sort(function (a, b) { return b.score - a.score; });
                thisConfig = thisConfig.slice(0, 20);
                var others = all.filter(function (s) { return s.grid !== grid || s.speed !== speed; });
                localStorage.setItem('snake-highscores', JSON.stringify(others.concat(thisConfig)));
            }

            function saveSettings(grid, speed) {
                localStorage.setItem('snake-settings-grid', grid);
                localStorage.setItem('snake-settings-speed', speed);
            }

            function loadSettings() {
                return {
                    grid: parseInt(localStorage.getItem('snake-settings-grid') || '2'),
                    speed: parseInt(localStorage.getItem('snake-settings-speed') || '1')
                };
            }

            function getBestScore(grid, speed) {
                var scores = loadHighScores();
                var best = 0;
                for (var i = 0; i < scores.length; i++) {
                    if (scores[i].grid === grid && scores[i].speed === speed && scores[i].score > best) {
                        best = scores[i].score;
                    }
                }
                return best;
            }

            function showBestScore() {
                var best = getBestScore(GRID, TICK_MS);
                bestScoreEl.textContent = best > 0 ? 'Meilleur score : ' + best : '';
            }

            // Sizing
            function resize() {
                var max = Math.min(window.innerWidth - 32, window.innerHeight - 120);
                cellSize = Math.floor(max / GRID);
                var size = cellSize * GRID;
                canvas.width = size;
                canvas.height = size;
                draw();
            }

            window.addEventListener('resize', resize);

            // Drawing
            function draw() {
                ctx.fillStyle = colorBg;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                if (!snake) return;

                ctx.fillStyle = colorFg;

                // Food
                ctx.fillRect(
                    food.x * cellSize + 1,
                    food.y * cellSize + 1,
                    cellSize - 2,
                    cellSize - 2
                );

                // Snake body
                for (var i = 1; i < snake.length; i++) {
                    ctx.fillRect(
                        snake[i].x * cellSize + 1,
                        snake[i].y * cellSize + 1,
                        cellSize - 2,
                        cellSize - 2
                    );
                }

                // Snake head (full cell, no gap)
                var hx = snake[0].x * cellSize;
                var hy = snake[0].y * cellSize;
                var cs = cellSize;
                ctx.fillRect(hx, hy, cs, cs);

                // Direction notch on head
                ctx.fillStyle = colorBg;
                ctx.beginPath();
                var notch = Math.floor(cs * 0.35);

                if (direction.x === 1) {
                    ctx.moveTo(hx, hy);
                    ctx.lineTo(hx + notch, hy + cs / 2);
                    ctx.lineTo(hx, hy + cs);
                } else if (direction.x === -1) {
                    ctx.moveTo(hx + cs, hy);
                    ctx.lineTo(hx + cs - notch, hy + cs / 2);
                    ctx.lineTo(hx + cs, hy + cs);
                } else if (direction.y === -1) {
                    ctx.moveTo(hx, hy + cs);
                    ctx.lineTo(hx + cs / 2, hy + cs - notch);
                    ctx.lineTo(hx + cs, hy + cs);
                } else if (direction.y === 1) {
                    ctx.moveTo(hx, hy);
                    ctx.lineTo(hx + cs / 2, hy + notch);
                    ctx.lineTo(hx + cs, hy);
                }
                ctx.fill();
            }

            // Food spawn
            function spawnFood() {
                var pos;
                do {
                    pos = {
                        x: Math.floor(Math.random() * GRID),
                        y: Math.floor(Math.random() * GRID)
                    };
                } while (snake.some(function (s) { return s.x === pos.x && s.y === pos.y; }));
                food = pos;
            }

            // Game tick
            function tick() {
                if (gameOver) return;

                direction = nextDirection;

                var head = {
                    x: snake[0].x + direction.x,
                    y: snake[0].y + direction.y
                };

                // Wall collision
                if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID) {
                    endGame();
                    return;
                }

                // Self collision
                for (var i = 0; i < snake.length; i++) {
                    if (snake[i].x === head.x && snake[i].y === head.y) {
                        endGame();
                        return;
                    }
                }

                snake.unshift(head);

                if (head.x === food.x && head.y === food.y) {
                    score++;
                    scoreEl.textContent = 'Score : ' + score;
                    spawnFood();
                } else {
                    snake.pop();
                }

                draw();
            }

            // Settings mappings
            var GRID_VALUES = [10, 15, 20, 25, 30];
            var SPEED_VALUES = [220, 180, 120, 80];
            var SPEED_LABELS = ['Lente', 'Normale', 'Rapide', 'Tr\u00e8s rapide'];
            var gridValueEl = document.getElementById('grid-value');
            var speedValueEl = document.getElementById('speed-value');

            function readSettings() {
                var gi = parseInt(settingGridEl.value, 10);
                var si = parseInt(settingSpeedEl.value, 10);
                GRID = GRID_VALUES[gi];
                TICK_MS = SPEED_VALUES[si];
            }

            function updateSettingLabels() {
                var gi = parseInt(settingGridEl.value, 10);
                var si = parseInt(settingSpeedEl.value, 10);
                gridValueEl.textContent = GRID_VALUES[gi] + ' \u00d7 ' + GRID_VALUES[gi];
                speedValueEl.textContent = SPEED_LABELS[si];
            }

            settingGridEl.addEventListener('input', function () {
                saveSettings(this.value, settingSpeedEl.value);
                updateSettingLabels();
                readSettings();
                showBestScore();
                initGame();
            });
            settingSpeedEl.addEventListener('input', function () {
                saveSettings(settingGridEl.value, this.value);
                updateSettingLabels();
                readSettings();
                showBestScore();
                initGame();
            });

            // Game lifecycle
            function initGame() {
                var center = Math.floor(GRID / 2);
                snake = [{ x: center, y: center }];
                direction = { x: 1, y: 0 };
                nextDirection = { x: 1, y: 0 };
                score = 0;
                gameOver = false;
                gameStarted = false;
                scoreEl.textContent = 'Score : 0';
                spawnFood();
                resize();
                draw();
            }

            function startGame() {
                readSettings();
                gameStarted = true;
                settingsEl.classList.add('hidden');
                overlayEl.classList.add('hidden');
                resize();
                interval = setInterval(tick, TICK_MS);
            }

            function endGame() {
                gameOver = true;
                clearInterval(interval);

                var best = getBestScore(GRID, TICK_MS);
                var isNewRecord = score > best;
                saveHighScore(score, GRID, TICK_MS);

                gameOverTextEl.textContent = 'Game Over';
                finalScoreEl.textContent = 'Score : ' + score;

                if (isNewRecord && score > 0) {
                    bestScoreEl.textContent = 'Nouveau record !';
                } else {
                    bestScoreEl.textContent = 'Meilleur : ' + Math.max(best, score);
                }

                restartHintEl.textContent = 'Appuyer sur \u00ab\u00a0Espace\u00a0\u00bb pour recommencer';
                overlayEl.classList.remove('hidden');
            }

            function restartGame() {
                gameOverTextEl.textContent = 'Snake';
                finalScoreEl.textContent = '';
                settingsEl.classList.remove('hidden');
                showBestScore();
                restartHintEl.textContent = 'Appuyer sur \u00ab\u00a0Espace\u00a0\u00bb pour jouer';
                initGame();
                overlayEl.classList.remove('hidden');
            }

            // Keyboard controls
            document.addEventListener('keydown', function (e) {
                switch (e.key) {
                    case 'ArrowUp': case 'w': case 'W':
                        if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                        break;
                    case 'ArrowDown': case 's': case 'S':
                        if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                        break;
                    case 'ArrowLeft': case 'a': case 'A':
                        if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                        break;
                    case 'ArrowRight': case 'd': case 'D':
                        if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                        break;
                    case ' ':
                        if (gameOver) restartGame();
                        else if (!gameStarted) startGame();
                        break;
                }
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].indexOf(e.key) !== -1) {
                    e.preventDefault();
                }
            });

            // Touch controls
            var touchStartX, touchStartY;
            var MIN_SWIPE = 30;

            canvas.addEventListener('touchstart', function (e) {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
                e.preventDefault();
            }, { passive: false });

            canvas.addEventListener('touchend', function (e) {
                if (touchStartX === undefined) return;
                var dx = e.changedTouches[0].clientX - touchStartX;
                var dy = e.changedTouches[0].clientY - touchStartY;
                touchStartX = undefined;

                if (Math.abs(dx) < MIN_SWIPE && Math.abs(dy) < MIN_SWIPE) {
                    if (gameOver) restartGame();
                    else if (!gameStarted) startGame();
                    return;
                }

                if (Math.abs(dx) > Math.abs(dy)) {
                    if (dx > 0 && direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    else if (dx < 0 && direction.x !== 1) nextDirection = { x: -1, y: 0 };
                } else {
                    if (dy > 0 && direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    else if (dy < 0 && direction.y !== 1) nextDirection = { x: 0, y: -1 };
                }
                e.preventDefault();
            }, { passive: false });

            // Init
            // Restaurer les paramètres sauvegardés
            var savedSettings = loadSettings();
            settingGridEl.value = savedSettings.grid;
            settingSpeedEl.value = savedSettings.speed;
            updateSettingLabels();
            readSettings();

            showBestScore();
            resize();
            initGame();
        })();
    </script>
</body>
</html>
